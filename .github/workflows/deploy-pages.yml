name: Deploy Deepshelf to GitHub Pages

# Publishes the self-contained web UI (docs/index.html) to GitHub Pages.
# The page runs fully client-side: it queries Open Library directly from the
# browser (CORS-enabled) and falls back to the curated corpus when offline.

on:
  push:
    branches: [main]
    paths: ["docs/**", ".github/workflows/deploy-pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages (self-enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
